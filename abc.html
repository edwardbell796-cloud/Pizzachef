<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizza Cheff | Premium Delivery</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #ff4d4d; --dark: #121212; --light: #ffffff; --gray: #f4f7f6; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    
    body { background: var(--gray); color: var(--dark); overflow-x: hidden; position: relative; }

    .bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden; }
    .floating-icon { position: absolute; color: rgba(255, 77, 77, 0.05); font-size: 2rem; animation: floatAround 20s linear infinite; }
    @keyframes floatAround { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(100vw, 100vh) rotate(360deg); } }

    nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
    .logo { font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: var(--primary); cursor: pointer; display: flex; align-items: center; gap: 10px; }
    .nav-icons { display: flex; gap: 20px; font-size: 1.2rem; align-items: center; }
    .nav-icons i { cursor: pointer; transition: 0.3s; }
    .nav-icons i:hover { color: var(--primary); }

    /* Login Styles */
    #loginBtn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
    #userProfile { display: none; align-items: center; gap: 10px; cursor: pointer; }
    #userImg { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }

    .search-container { position: relative; display: flex; align-items: center; }
    #navSearchInput { width: 0; opacity: 0; padding: 8px 0; border: none; outline: none; border-bottom: 2px solid var(--primary); background: transparent; transition: 0.4s; font-size: 0.9rem; }
    #navSearchInput.active { width: 150px; opacity: 1; padding: 8px 10px; margin-right: 10px; }

    .sidebar { position: fixed; top: 0; right: -350px; width: 350px; height: 100%; background: var(--light); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; box-shadow: -5px 0 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
    .sidebar.active { right: 0; }
    #sideNav { left: -300px; right: auto; width: 300px; }
    #sideNav.active { left: 0; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
    .overlay.active { display: block; }

    .hero { padding: 80px 5%; text-align: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1628840042765-356cda07504e?q=80&w=1000&auto=format&fit=crop'); background-size: cover; background-position: center; color: white; }
    .hero h1 { font-family: 'Dancing Script', cursive; font-size: 4.5rem; color: var(--light); margin-bottom: 10px; text-shadow: 3px 3px 10px rgba(0,0,0,0.7); }
    .hero p { font-family: 'Dancing Script', cursive; color: var(--primary); font-size: 1.8rem; font-weight: 700; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }

    .cat-bar { display: flex; justify-content: center; gap: 15px; padding: 20px 5%; overflow-x: auto; }
    .cat-btn { padding: 10px 25px; background: var(--light); border: none; border-radius: 50px; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .cat-btn.active, .cat-btn:hover { background: var(--primary); color: var(--light); }

    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px 5% 100px 5%; }
    .pizza-card { background: var(--light); border-radius: 25px; overflow: hidden; transition: 0.4s; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .pizza-card:hover { transform: translateY(-10px); }
    .pizza-img { width: 100%; height: 200px; object-fit: cover; }
    .pizza-info { padding: 20px; }
    .pizza-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 5px; }
    .pizza-price { color: var(--primary); font-weight: 800; font-size: 1.2rem; }

    .add-btn { width: 100%; padding: 12px; background: var(--dark); color: var(--light); border: none; border-radius: 12px; margin-top: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .add-btn:hover { background: var(--primary); }

    .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
    .cart-controls { display: flex; align-items: center; gap: 10px; }
    .qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #ddd; background: none; cursor: pointer; }

    .digital-bill { background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-top: 20px; }
    .bill-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
    .bill-total { border-top: 2px dashed #ddd; padding-top: 10px; margin-top: 10px; font-weight: 800; font-size: 1.1rem; }

    .checkout-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 800; margin-top: 20px; cursor: pointer; }

    .track-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .nav-menu-item { padding: 15px; font-size: 1.1rem; font-weight: 600; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; gap: 10px; }
    .nav-menu-item:hover { color: var(--primary); }

    .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2rem; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

    @media (max-width: 768px) { .hero h1 { font-size: 3rem; } .sidebar { width: 100%; right: -100%; } #sideNav { left: -100%; } }
  </style>
</head>
<body>

<div class="bg-canvas" id="canvas"></div>

<nav>
  <div class="logo" onclick="showSection('menu')"><i class="fas fa-utensils"></i> Pizza Cheff</div>
  <div class="nav-icons">
    <div class="search-container">
        <input type="text" id="navSearchInput" placeholder="Search food..." oninput="filterSearch()">
        <i class="fas fa-search" onclick="toggleSearchBar()"></i>
    </div>
    <i class="fas fa-shopping-basket" onclick="toggleCart()"></i>
    <button id="loginBtn" onclick="login()">Login</button>
    <div id="userProfile" onclick="logout()"><img id="userImg" src="" alt="User"></div>
    <i class="fas fa-bars" onclick="toggleNav()"></i>
  </div>
</nav>

<div class="overlay" id="overlay" onclick="closeUIs()"></div>

<div class="sidebar" id="sideNav">
    <h2 style="margin-bottom: 20px;">Menu</h2>
    <div class="nav-menu-item" onclick="showSection('menu')"><i class="fas fa-pizza-slice"></i> Home Menu</div>
    <div class="nav-menu-item" onclick="showSection('track')"><i class="fas fa-truck"></i> My Orders</div>
    <div class="nav-menu-item" onclick="showSection('complaints')"><i class="fas fa-headset"></i> Help Centre</div>
</div>

<div class="sidebar" id="cartSidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;"><h2>Your Basket</h2><i class="fas fa-times" onclick="toggleCart()" style="cursor:pointer;"></i></div>
    <div id="cartItems" style="flex:1; overflow-y:auto;"></div>
    <div class="digital-bill">
        <div class="bill-line"><span>Subtotal:</span> <span id="billSubtotal">Rs 0</span></div>
        <div class="bill-line"><span>Delivery Fee:</span> <span>Rs 99</span></div>
        <div class="bill-line bill-total"><span>Total Amount:</span> <span id="cartTotal">Rs 0</span></div>
    </div>
    <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout</button>
</div>

<div id="menuView">
    <div class="hero"><h1 id="shopName">Pizza Cheff</h1><p id="shopDetails">Loading details...</p></div>
    <div class="cat-bar" id="catBar">
        <button class="cat-btn active" onclick="filterMenu('all')">All</button>
        <button class="cat-btn" onclick="filterMenu('pizza')">Pizza</button>
        <button class="cat-btn" onclick="filterMenu('burger')">Burger</button>
        <button class="cat-btn" onclick="filterMenu('fastfood')">Fast Food</button>
    </div>
    <div class="menu-grid" id="menuGrid"></div>
</div>

<div id="trackView" style="display:none; padding: 40px 5%;">
    <h2 style="margin-bottom:20px;"><i class="fas fa-motorcycle"></i> My Active Orders</h2>
    <div id="trackList"></div>
    <h2 style="margin-top:40px; margin-bottom:20px;"><i class="fas fa-history"></i> Past History</h2>
    <div id="historyList"></div>
</div>

<div id="complaintsView" style="display:none; padding: 40px 5%;">
    <div style="background:white; padding:30px; border-radius:20px;">
        <h2>Help & Support 💬</h2>
        <div style="margin:15px 0;"><label>Order ID</label><input type="text" id="compOrder" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></div>
        <div style="margin:15px 0;"><label>Describe the Issue</label><textarea id="compMsg" style="width:100%; height:100px; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea></div>
        <button class="add-btn" onclick="submitComplaint()">Submit Ticket</button>
    </div>
</div>

<div id="checkoutModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:3000; justify-content:center; align-items:center; padding:20px;">
    <div style="background:white; padding:30px; border-radius:25px; width:100%; max-width:450px;">
        <h2 style="margin-bottom:20px;">Finalize Order 🛒</h2>
        <input type="text" id="custName" placeholder="Full Name" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
        <input type="text" id="custPhone" placeholder="Phone Number" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
        <input type="text" id="custAddress" placeholder="Full Delivery Address" style="width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:1px solid #ddd;">
        <button class="checkout-btn" onclick="confirmOrder()">Confirm Order</button>
        <button class="add-btn" onclick="document.getElementById('checkoutModal').style.display='none'" style="background:#eee; color:#333;">Cancel</button>
    </div>
</div>

<a href="#" id="waLink" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
  import { getDatabase, ref, onValue, push, set, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBq9W6hW_X5sc66r7kB6p8kMUq-17jgJ50",
    authDomain: "pizza-cheff-92db6.firebaseapp.com",
    projectId: "pizza-cheff-92db6",
    databaseURL: "https://pizza-cheff-92db6-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;
  let menuData = {};
  let cart = [];
  const DELIVERY_FEE = 99;

  // UI Setup
  const canvas = document.getElementById('canvas');
  ['fa-pizza-slice', 'fa-hamburger', 'fa-hotdog'].forEach(icon => {
      for(let i=0; i<5; i++) {
          const el = document.createElement('i');
          el.className = `fas ${icon} floating-icon`;
          el.style.left = Math.random() * 100 + 'vw';
          el.style.top = Math.random() * 100 + 'vh';
          el.style.animationDelay = Math.random() * 5 + 's';
          canvas.appendChild(el);
      }
  });

  // Auth Handling
  window.login = () => signInWithPopup(auth, provider);
  window.logout = () => { if(confirm("Logout?")) signOut(auth).then(() => location.reload()); };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('loginBtn').style.display = 'none';
      document.getElementById('userProfile').style.display = 'flex';
      document.getElementById('userImg').src = user.photoURL;
      document.getElementById('custName').value = user.displayName;
    } else {
      currentUser = null;
      document.getElementById('loginBtn').style.display = 'block';
      document.getElementById('userProfile').style.display = 'none';
    }
  });

  // Data Loading
  onValue(ref(database, 'settings/general'), (snap) => {
    const d = snap.val();
    if(d) {
        document.getElementById('shopDetails').innerText = `${d.address || 'Karachi'} | ${d.phone || '0000'}`;
        document.getElementById('waLink').href = `https://wa.me/${d.whatsapp || ''}`;
    }
  });

  onValue(ref(database, 'menu'), (snap) => { menuData = snap.val() || {}; renderMenu('all'); });

  function renderMenu(cat, searchStr = "") {
    const grid = document.getElementById('menuGrid'); grid.innerHTML = "";
    Object.keys(menuData).forEach(id => {
      const item = menuData[id];
      if((cat === 'all' || item.category === cat) && item.name.toLowerCase().includes(searchStr.toLowerCase())) {
        grid.innerHTML += `<div class="pizza-card"><img src="${item.image}" class="pizza-img"><div class="pizza-info"><div class="pizza-name">${item.name}</div><div class="pizza-price">Rs ${item.price}</div><button class="add-btn" onclick="addToCart('${id}')">Add to Cart</button></div></div>`;
      }
    });
  }

  window.addToCart = (id) => { const existing = cart.find(i => i.id === id); if(existing) existing.qty++; else cart.push({ id, ...menuData[id], qty: 1 }); updateCartUI(); };
  function updateCartUI() {
    const container = document.getElementById('cartItems'); let subtotal = 0; container.innerHTML = "";
    cart.forEach((item, idx) => {
        subtotal += item.price * item.qty;
        container.innerHTML += `<div class="cart-item"><div><b>${item.name}</b><br>Rs ${item.price}</div><div class="cart-controls"><button class="qty-btn" onclick="changeQty(${idx}, -1)">-</button><span>${item.qty}</span><button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button></div></div>`;
    });
    document.getElementById('billSubtotal').innerText = "Rs " + subtotal;
    document.getElementById('cartTotal').innerText = "Rs " + (cart.length > 0 ? (subtotal + DELIVERY_FEE) : 0);
  }
  window.changeQty = (idx, d) => { cart[idx].qty += d; if(cart[idx].qty <= 0) cart.splice(idx, 1); updateCartUI(); };

  // Order Handling
  window.openCheckout = () => { if(!currentUser) return alert("Please Login with Google first!"); if(cart.length === 0) return alert("Cart is empty!"); document.getElementById('checkoutModal').style.display = 'flex'; };

  window.confirmOrder = () => {
    const name = document.getElementById('custName').value;
    const phone = document.getElementById('custPhone').value;
    const address = document.getElementById('custAddress').value;
    if(!name || !phone || !address) return alert("Fill all details!");

    const orderId = "ORD-" + Date.now();
    const finalTotal = cart.reduce((s, i) => s + (i.price * i.qty), 0) + DELIVERY_FEE;

    set(ref(database, 'orders/' + orderId), {
        userId: currentUser.uid, customerName: name, phone, address, items: cart, total: finalTotal, status: 'pending', timestamp: Date.now()
    }).then(() => {
        onValue(ref(database, 'settings/general'), (snap) => {
            const settings = snap.val();
            const adminNum = (settings && settings.whatsapp) ? settings.whatsapp : "923000000000";
            const itemLines = cart.map(i => `%0A- ${i.qty}x ${i.name}`).join('');
            const message = `*New Order: ${orderId}*%0AName: ${name}%0AItems: ${itemLines}%0ATotal: Rs ${finalTotal}`;
            
            window.open(`https://wa.me/${adminNum}?text=${message}`);
            alert("Order placed!"); cart = []; updateCartUI();
            document.getElementById('checkoutModal').style.display = 'none';
            showSection('track');
        }, { onlyOnce: true });
    });
  };

  window.renderTrack = () => {
    if(!currentUser) return;
    const tList = document.getElementById('trackList'); const hList = document.getElementById('historyList');
    const userQuery = query(ref(database, 'orders'), orderByChild('userId'), equalTo(currentUser.uid));
    onValue(userQuery, (snap) => {
      tList.innerHTML = ""; hList.innerHTML = "";
      const data = snap.val(); if(!data) return;
      Object.keys(data).reverse().forEach(id => {
        const o = data[id];
        const html = `<div class="track-card"><b>ID: ${id}</b><p>Status: <span style="color:var(--primary)">${o.status}</span></p><b>Total: Rs ${o.total}</b></div>`;
        if(['delivered','cancelled','completed'].includes(o.status.toLowerCase())) hList.innerHTML += html; else tList.innerHTML += html;
      });
    });
  };

  // Nav Logic
  window.filterMenu = (c) => { document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); renderMenu(c); };
  window.toggleSearchBar = () => document.getElementById('navSearchInput').classList.toggle('active');
  window.filterSearch = () => renderMenu('all', document.getElementById('navSearchInput').value);
  window.toggleNav = () => { document.getElementById('sideNav').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); };
  window.toggleCart = () => { document.getElementById('cartSidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); };
  window.closeUIs = () => { document.getElementById('sideNav').classList.remove('active'); document.getElementById('cartSidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); };
  window.showSection = (s) => {
    document.getElementById('menuView').style.display = s === 'menu' ? 'block' : 'none';
    document.getElementById('trackView').style.display = s === 'track' ? 'block' : 'none';
    document.getElementById('complaintsView').style.display = s === 'complaints' ? 'block' : 'none';
    if(s === 'track') renderTrack();
    closeUIs();
  };

  window.submitComplaint = () => {
      const id = document.getElementById('compOrder').value;
      const msg = document.getElementById('compMsg').value;
      if(id && msg) {
          push(ref(database, 'complaints/'), { userId: currentUser.uid, orderId: id, message: msg, timestamp: Date.now() })
          .then(() => { alert("Reported successfully."); showSection('menu'); });
      }
  };
</script>
</body>
</html>
